name: Build macOS app

# Pushing a version tag (e.g. v0.9.5) builds the .app, creates the GitHub Release,
# and attaches the zip — all automatically. Can also be run manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build .app bundle
        env:
          VERSION: ${{ github.ref_name }}   # e.g. "v0.9.5"; the script strips the leading "v"
        run: ./scripts/build-app.sh

      - name: Zip .app
        run: |
          cd dist
          ditto -c -k --keepParent "Podcast Transcript Studio.app" "PodcastTranscriptStudio-macos-arm64.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PodcastTranscriptStudio-macos-arm64
          path: dist/PodcastTranscriptStudio-macos-arm64.zip

      - name: Create release and attach app
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET: dist/PodcastTranscriptStudio-macos-arm64.zip
        run: |
          # Create the release if it doesn't exist yet; otherwise just (re)upload the asset.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$ASSET" \
              --title "$GITHUB_REF_NAME" \
              --notes-file .github/release-notes.md
          fi
